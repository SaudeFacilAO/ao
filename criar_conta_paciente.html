<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta de Paciente</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-box {
            background: #fff;
            padding: 25px;
            width: 420px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="register-box">

    <h2>Criar Conta de Paciente</h2>

    <div class="form-group">
        <label>Nome</label>
        <input type="text" id="nome">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email">
    </div>

    <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha">
    </div>

    <div class="form-group">
        <label>Telefone</label>
        <input type="text" id="telefone">
    </div>

    <div class="form-group">
        <label>BI</label>
        <input type="text" id="bi">
    </div>

    <div class="form-group">
        <label>Género</label>
        <select id="genero">
            <option value="">Selecione</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
        </select>
    </div>

    <div class="form-group">
        <label>Data de Nascimento</label>
        <input type="date" id="data_nascimento">
    </div>

    <div class="form-group">
        <label>Endereço</label>
        <input type="text" id="endereco">
    </div>

    <button onclick="criarContaPaciente()">
        Criar Conta
    </button>

</div>

<script src="assets/js/paciente.js"></script>

</body>
</html>
